<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documento Contratual</title>

<style>
*{box-sizing:border-box;}
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;}
.card{max-width:900px;margin:auto;background:#fff;padding:24px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h1{text-align:center;font-size:20px;margin-bottom:20px;}
h2{font-size:16px;margin-top:20px;border-bottom:1px solid #ddd;padding-bottom:5px;}
form{display:flex;flex-direction:column;gap:18px;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-weight:bold;}
input,select{width:100%;padding:10px;border-radius:6px;border:1px solid #ccc;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.servicos-container{display:flex;flex-direction:column;gap:10px;}
.servico-item{display:flex;gap:8px;}
.servico-item input{flex:1;}
.btn-add,.btn-remove{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.btn-add{background:#1f7a3a;color:#fff;}
.btn-remove{background:#c0392b;color:#fff;}
button{margin-top:10px;padding:12px;background:#1f7a3a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
</style>
</head>

<body>

<div class="card">
<h1>Documento Contratual</h1>

<form id="formContrato">

<h2>Contratante</h2>

<div class="field">
<label>Empresa</label>
<input type="text" id="empresa" placeholder="Nome da empresa" required>
</div>

<div class="field">
<label>CNPJ</label>
<input type="text" id="cnpj" placeholder="00.000.000/0000-00" required>
</div>

<div class="grid">
<div class="field">
<label>Rua</label>
<input type="text" id="rua" placeholder="Rua" required>
</div>
<div class="field">
<label>Número</label>
<input type="text" id="numero" placeholder="123" required>
</div>
</div>

<div class="field">
<label>Bairro</label>
<input type="text" id="bairro" placeholder="Bairro" required>
</div>

<div class="grid">
<div class="field">
<label>CEP</label>
<input type="text" id="cep" placeholder="00000-000" required>
</div>
<div class="field">
<label>Cidade / Estado</label>
<input type="text" id="cidade" placeholder="Cidade - UF" required>
</div>
</div>

<h2>Contratado</h2>

<div class="field">
<label>Nome</label>
<input type="text" id="contratado_nome" placeholder="Nome completo" required>
</div>

<div class="field">
<label>CPF</label>
<input type="text" id="cpf" placeholder="000.000.000-00" required>
</div>

<div class="grid">
<div class="field">
<label>Rua</label>
<input type="text" id="contratado_rua" placeholder="Rua" required>
</div>
<div class="field">
<label>Número</label>
<input type="text" id="contratado_numero" placeholder="123" required>
</div>
</div>

<div class="field">
<label>Bairro</label>
<input type="text" id="contratado_bairro" placeholder="Bairro" required>
</div>

<div class="grid">
<div class="field">
<label>CEP</label>
<input type="text" id="contratado_cep" placeholder="00000-000" required>
</div>
<div class="field">
<label>Cidade / Estado</label>
<input type="text" id="contratado_cidade" placeholder="Cidade - UF" required>
</div>
</div>

<!-- RESTO ORIGINAL -->

<div class="field">
<label>Serviços</label>
<div class="servicos-container" id="servicosContainer">
<div class="servico-item">
<input type="text" placeholder="Digite o serviço">
<button type="button" class="btn-add" onclick="addServico()">+</button>
</div>
</div>
</div>

<div class="field">
<label>Valor</label>
<input type="text" id="valor" placeholder="R$ 0,00">
</div>

<div class="field">
<label>Percentual (%)</label>
<input type="number" id="percentual" max="100" min="0">
</div>

<div class="field">
<label style="display:flex; gap:10px;">
<input type="checkbox" id="toggleProspec" style="width:auto;">
Prospecção
</label>
</div>

<div class="field" id="campoProspec" style="display:none;">
<label>% Prospecção</label>
<input type="number" id="percentualProspec" max="100" min="0">
</div>

<div class="field">
<label>Sexo</label>
<select id="sexo" required>
<option value="" disabled selected>Selecione</option>
<option>Masculino</option>
<option>Feminino</option>
</select>
</div>

<div class="field">
<label>Prazo</label>
<input type="date" id="prazo">
</div>

<button type="submit">Gerar Documento</button>

</form>
</div>

<script>
// CNPJ
cnpj.addEventListener('input', e=>{
let v=e.target.value.replace(/\D/g,'');
v=v.replace(/^(\d{2})(\d)/,'$1.$2');
v=v.replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3');
v=v.replace(/\.(\d{3})(\d)/,'.$1/$2');
v=v.replace(/(\d{4})(\d)/,'$1-$2');
e.target.value=v.substring(0,18);
});

// CPF
cpf.addEventListener('input', e=>{
let v=e.target.value.replace(/\D/g,'');
v=v.replace(/(\d{3})(\d)/,'$1.$2');
v=v.replace(/(\d{3})(\d)/,'$1.$2');
v=v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
e.target.value=v.substring(0,14);
});

// CEP função reaproveitável
function aplicarCEP(inputCEP, rua, bairro, cidade){
inputCEP.addEventListener('input', e=>{
let v=e.target.value.replace(/\D/g,'');
if(v.length>5) v=v.replace(/^(\d{5})(\d)/,'$1-$2');
e.target.value=v.substring(0,9);
});

inputCEP.addEventListener('blur', async ()=>{
let cep=inputCEP.value.replace(/\D/g,'');
if(cep.length!==8) return;

try{
const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`);
const d=await r.json();
if(d.erro) return alert('CEP não encontrado');

rua.value=d.logradouro;
bairro.value=d.bairro;
cidade.value=`${d.localidade} - ${d.uf}`;
}catch{
alert('Erro ao buscar CEP');
}
});
}

// aplicar nos dois
aplicarCEP(cep, rua, bairro, cidade);
aplicarCEP(contratado_cep, contratado_rua, contratado_bairro, contratado_cidade);

// serviços
function addServico(){
const div=document.createElement('div');
div.classList.add('servico-item');
div.innerHTML=`
<input type="text" placeholder="Digite o serviço">
<button type="button" class="btn-remove" onclick="this.parentElement.remove()">-</button>
`;
servicosContainer.appendChild(div);
}

// valor
valor.addEventListener('input', e=>{
let v=e.target.value.replace(/\D/g,'');
v=(Number(v)/100).toFixed(2)+'';
v=v.replace('.',',');
v=v.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
e.target.value='R$ '+v;
});

// prospecção
toggleProspec.addEventListener('change', ()=>{
campoProspec.style.display = toggleProspec.checked ? 'block' : 'none';
});

// limitar %
function limitar(id){
const el=document.getElementById(id);
el.addEventListener('input', ()=>{
if(el.value>100) el.value=100;
if(el.value<0) el.value=0;
});
}
limitar('percentual');
limitar('percentualProspec');

// WEBHOOK (mantido)
formContrato.addEventListener('submit', async function(e){
e.preventDefault();

const servicos=[...document.querySelectorAll('#servicosContainer input')]
.map(i=>i.value).filter(v=>v);

const data={
empresa:empresa.value,
cnpj:cnpj.value,
rua:rua.value,
numero:numero.value,
bairro:bairro.value,
cep:cep.value,
cidade:cidade.value,

contratado:{
nome:contratado_nome.value,
cpf:cpf.value,
rua:contratado_rua.value,
numero:contratado_numero.value,
bairro:contratado_bairro.value,
cep:contratado_cep.value,
cidade:contratado_cidade.value
},

servicos,
valor:valor.value,
percentual:percentual.value,
prospeccao:toggleProspec.checked,
percentualProspec:percentualProspec.value,
sexo:sexo.value,
prazo:prazo.value
};

try{
await fetch('https://projeto1-n8n.khyklu.easypanel.host/webhook-test/983b1659-0ae4-4265-a113-85e04f07b1ae',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(data)
});
alert('Enviado com sucesso');
}catch{
alert('Erro ao enviar');
}
});
</script>

</body>
</html>
