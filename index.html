<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Documento Contratual</title>

<style>
*{box-sizing:border-box;}
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;}
.card{max-width:900px;margin:auto;background:#fff;padding:24px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h1{text-align:center;font-size:20px;margin-bottom:20px;}
h2{font-size:16px;margin-top:20px;border-bottom:1px solid #ddd;padding-bottom:5px;}
form{display:flex;flex-direction:column;gap:18px;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-weight:bold;}
input,select{width:100%;padding:10px;border-radius:6px;border:1px solid #ccc;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.servicos-container{display:flex;flex-direction:column;gap:10px;}
.servico-item{display:flex;gap:8px;}
.servico-item input{flex:1;}
.btn-add,.btn-remove{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.btn-add{background:#1f7a3a;color:#fff;}
.btn-remove{background:#b42e1f;color:#fff;}
button{margin-top:10px;padding:12px;background:#1f7a3a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.btn-add, .btn-remove{
  width:28px;
  height:28px;
  padding:0;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.checkbox-group{display:flex;gap:20px;flex-wrap:wrap;}
.checkbox-item{display:flex;gap:8px;align-items:center;}
.checkbox-item input{width:auto;}
/* Botão vermelho de limpar formulário */
.btn-limpar{
  background:#b42e1f;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin-top:6px;
}
.actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
</style>
</head>

<body>

<div class="card">
  <h1>Documento Contratual</h1>

  <form id="formContrato">

    <h2>Contratante</h2>

    <div class="field">
      <label>Selecione o Contratante</label>
      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="ecosistema" name="contratante" value="Ecosistema">
          <label for="ecosistema" style="margin:0;">Ecosistema</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="limaluro" name="contratante" value="Lima&Luro">
          <label for="limaluro" style="margin:0;">Lima&Luro</label>
        </div>
      </div>
    </div>

    <h2>Contratado</h2> 

    <div class="field">
      <label>Tipo de Pessoa</label>
      <select id="tipoPessoa" required>
        <option value="" disabled selected>Selecione</option>
        <option value="fisica">Pessoa Física</option>
        <option value="juridica">Pessoa Jurídica</option>
      </select>
    </div>

    <div class="field" id="campoNome">
      <label>Nome</label>
      <input type="text" id="nome" placeholder="Nome completo" required>
    </div>

    <div class="field" id="campoCPF" style="display:none;">
      <label>CPF</label>
      <input type="text" id="cpf" placeholder="000.000.000-00">
    </div>

    <div class="field" id="campoRG" style="display:none;">
      <label>RG</label>
      <input type="text" id="rg" placeholder="00.000.000-0">
    </div>

    <div class="field" id="campoCNPJ" style="display:none;">
      <label>CNPJ</label>
      <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
    </div>

    <div class="grid">
      <div class="field">
        <label>Rua</label>
        <input type="text" id="rua" placeholder="Rua" required>
      </div>
      <div class="field">
        <label>Número</label>
        <input type="text" id="numero" placeholder="123" required>
      </div>
    </div>

    <div class="field">
      <label>Bairro</label>
      <input type="text" id="bairro" placeholder="Bairro" required>
    </div>

    <div class="grid">
      <div class="field">
        <label>CEP</label>
        <input type="text" id="cep" placeholder="00000-000" required>
      </div>
      <div class="field">
        <label>Cidade / Estado</label>
        <input type="text" id="cidade" placeholder="Cidade - UF" required>
      </div>
    </div>

    <div class="field">
      <label>Serviços</label>
      <div class="servicos-container" id="servicosContainer">
        <div class="servico-item">
          <input type="text" placeholder="Digite o serviço">
          <button type="button" class="btn-add" onclick="addServico()">+</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Valor</label>
      <input type="text" id="valor" placeholder="R$ 0,00">
    </div>

    <div class="field">
      <label>Percentual (%)</label>
      <input type="number" id="percentual" max="100" min="0">
    </div>

    <div class="field">
      <label style="display:flex; gap:10px;">
        <input type="checkbox" id="toggleProspec" style="width:auto;">
        Prospecção
      </label>
    </div>

    <div class="field" id="campoProspec" style="display:none;">
      <label>% Prospecção</label>
      <input type="number" id="percentualProspec" max="100" min="0">
    </div>

    <div class="field">
      <label>Sexo</label>
      <select id="sexo" required>
        <option value="" disabled selected>Selecione</option>
        <option>Masculino</option>
        <option>Feminino</option>
      </select>
    </div>

    <div class="field">
      <label>Prazo</label>
      <input type="date" id="prazo">
    </div>

    <div class="actions">
      <button type="submit">Gerar Documento</button>
      <button type="button" id="btnLimpar" class="btn-limpar">Limpar formulário</button>
    </div>

  </form>
</div>

<script>
// Element references
const formContrato = document.getElementById('formContrato');
const tipoPessoa = document.getElementById('tipoPessoa');
const cnpj = document.getElementById('cnpj');
const cpf = document.getElementById('cpf');
const rg = document.getElementById('rg');
const campoCPF = document.getElementById('campoCPF');
const campoRG = document.getElementById('campoRG');
const campoCNPJ = document.getElementById('campoCNPJ');
const ecosistema = document.getElementById('ecosistema');
const limaluro = document.getElementById('limaluro');
const servicosContainer = document.getElementById('servicosContainer');
const valor = document.getElementById('valor');
const percentual = document.getElementById('percentual');
const toggleProspec = document.getElementById('toggleProspec');
const campoProspec = document.getElementById('campoProspec');
const percentualProspec = document.getElementById('percentualProspec');
const nome = document.getElementById('nome');
const rua = document.getElementById('rua');
const numero = document.getElementById('numero');
const bairro = document.getElementById('bairro');
const cep = document.getElementById('cep');
const cidade = document.getElementById('cidade');
const sexo = document.getElementById('sexo');
const prazo = document.getElementById('prazo');
const btnLimpar = document.getElementById('btnLimpar');

// Controlar tipo de pessoa e mostrar campos apropriados
tipoPessoa.addEventListener('change', function(){
  const isFisica = this.value === 'fisica';
  const isJuridica = this.value === 'juridica';

  campoCPF.style.display = isFisica ? 'flex' : 'none';
  campoRG.style.display = isFisica ? 'flex' : 'none';
  campoCNPJ.style.display = isJuridica ? 'flex' : 'none';

  // Limpar os campos não utilizados
  if(isFisica){
    cnpj.value = '';
  } else {
    cpf.value = '';
    rg.value = '';
  }
});

// Controlar checkboxes mutuamente exclusivas para contratante
ecosistema.addEventListener('change', function(){
  if(this.checked) limaluro.checked = false;
});

limaluro.addEventListener('change', function(){
  if(this.checked) ecosistema.checked = false;
});

// CNPJ
cnpj.addEventListener('input', e=>{
  let v=e.target.value.replace(/\D/g,'');
  v=v.replace(/^(\d{2})(\d)/,'$1.$2');
  v=v.replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3');
  v=v.replace(/\.(\d{3})(\d)/,'.$1/$2');
  v=v.replace(/(\d{4})(\d)/,'$1-$2');
  e.target.value=v.substring(0,18);
});

// CPF
cpf.addEventListener('input', e=>{
  let v=e.target.value.replace(/\D/g,'');
  v=v.replace(/(\d{3})(\d)/,'$1.$2');
  v=v.replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3');
  v=v.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/,'$1.$2.$3-$4');
  e.target.value=v.substring(0,14);
});

// RG
rg.addEventListener('input', e=>{
  let v=e.target.value.replace(/\D/g,'');
  v=v.replace(/(\d{2})(\d)/,'$1.$2');
  v=v.replace(/(\d{2})\.(\d{3})(\d)/,'$1.$2.$3');
  v=v.replace(/(\d{2})\.(\d{3})\.(\d{3})(\d)/,'$1.$2.$3-$4');
  e.target.value=v.substring(0,12);
});

// CEP função segura
function aplicarCEP(inputCEP, ruaEl, bairroEl, cidadeEl){
  if(!inputCEP || !ruaEl || !bairroEl || !cidadeEl) return;

  inputCEP.addEventListener('input', e=>{
    let v=e.target.value.replace(/\D/g,'');
    if(v.length>5) v=v.replace(/^(\d{5})(\d)/,'$1-$2');
    e.target.value=v.substring(0,9);
  });

  inputCEP.addEventListener('blur', async ()=>{
    let cepValue=inputCEP.value.replace(/\D/g,'');
    if(cepValue.length!==8) return;

    try{
      const r=await fetch(`https://viacep.com.br/ws/${cepValue}/json/`);
      const d=await r.json();
      if(d.erro) return alert('CEP não encontrado');

      ruaEl.value=d.logradouro;
      bairroEl.value=d.bairro;
      cidadeEl.value=`${d.localidade} - ${d.uf}`;
    }catch{
      alert('Erro ao buscar CEP');
    }
  });
}

// Aplica CEP
aplicarCEP(cep, rua, bairro, cidade);

// Serviços
function addServico(){
  const div=document.createElement('div');
  div.classList.add('servico-item');
  div.innerHTML=`
    <input type="text" placeholder="Digite o serviço">
    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">-</button>
  `;
  servicosContainer.appendChild(div);
}

// Valor
valor.addEventListener('input', e=>{
  let v=e.target.value.replace(/\D/g,'');
  v=(Number(v)/100).toFixed(2)+'';
  v=v.replace('.',',');
  v=v.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  e.target.value='R$ '+v;
});

// Prospecção
toggleProspec.addEventListener('change', ()=>{
  campoProspec.style.display = toggleProspec.checked ? 'block' : 'none';
});

// Limitar %
function limitar(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('input', ()=>{
    if(el.value>100) el.value=100;
    if(el.value<0) el.value=0;
  });
}
limitar('percentual');
limitar('percentualProspec');

// Função para limpar formulário (acionada pelo botão vermelho)
function limparFormulario(){
  // Reset básico do form
  formContrato.reset();

  // Restaurar estado visual dos campos condicionais
  campoCPF.style.display = 'none';
  campoRG.style.display = 'none';
  campoCNPJ.style.display = 'none';
  campoProspec.style.display = 'none';

  // Restaurar container de serviços para o estado inicial (um campo + botão de adicionar)
  servicosContainer.innerHTML = `
    <div class="servico-item">
      <input type="text" placeholder="Digite o serviço">
      <button type="button" class="btn-add" onclick="addServico()">+</button>
    </div>
  `;
}

// Associa o botão limpar
btnLimpar.addEventListener('click', function(){
  // Limpa sem pedir confirmação (se quiser confirmação, substitua por confirm())
  limparFormulario();
});

// Envio e recebimento do PDF com nome personalizado
formContrato.addEventListener('submit', async function(e){
  e.preventDefault();

  // Verificar se selecionou contratante
  if(!ecosistema.checked && !limaluro.checked){
    alert('Selecione um contratante (Ecosistema ou Lima&Luro)');
    return;
  }

  const contratante = ecosistema.checked ? 'Ecosistema' : 'Lima&Luro';

  const servicos = [...document.querySelectorAll('#servicosContainer input')]
    .map(i=>i.value).filter(v=>v);

  const tipoPessoaSelecionado = tipoPessoa.value;

  const data = {
    contratante: contratante,
    contratado: {
      tipoPessoa: tipoPessoaSelecionado,
      nome: nome.value,
      cpf: tipoPessoaSelecionado === 'fisica' ? cpf.value : '',
      rg: tipoPessoaSelecionado === 'fisica' ? rg.value : '',
      cnpj: tipoPessoaSelecionado === 'juridica' ? cnpj.value : '',
      rua: rua.value,
      numero: numero.value,
      bairro: bairro.value,
      cep: cep.value,
      cidade: cidade.value
    },
    servicos,
    valor: valor.value,
    percentual: percentual.value,
    prospeccao: toggleProspec.checked,
    percentualProspec: percentualProspec.value,
    sexo: sexo.value,
    prazo: prazo.value
  };

  try{
    const response = await fetch('https://projeto1-n8n.khyklu.easypanel.host/webhook-test/db0338f3-a387-4a7a-8981-c17c540ed3eb', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });

    if(!response.ok){
      // tenta ler texto de erro se houver
      let errText = '';
      try { errText = await response.text(); } catch {}
      throw new Error('Erro ao gerar PDF' + (errText ? (': ' + errText) : ''));
    }

    // Recebe o PDF como blob
    const blob = await response.blob();

    // Gera URL temporária
    const url = window.URL.createObjectURL(blob);

    // Sanitiza nome do contratado para evitar caracteres inválidos em filename
    const nomeValue = (nome.value || '').trim();
    const safeName = nomeValue.replace(/[\/\\:*?"<>|]/g,'').replace(/\s+/g,' ').trim() || 'SemNome';

    // Cria link para download com nome personalizado
    const a = document.createElement('a');
    a.href = url;
    a.download = `Contrato ${safeName}.pdf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);

    alert('PDF gerado e baixado com sucesso!');

    // OBS: NÃO limpamos o formulário automaticamente — os dados permanecem até o usuário clicar em "Limpar formulário".
  }catch(err){
    console.error(err);
    alert('Erro ao enviar ou gerar PDF');
  }
});
</script>

</body>
</html>
